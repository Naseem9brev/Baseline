<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baseline</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__baselineLoadTimeout = window.setTimeout(function () {
        var root = document.getElementById('root');
        if (root && !root.childElementCount) {
          root.innerHTML =
            '<div style="padding:16px;font-family:system-ui,sans-serif;font-size:14px;line-height:1.5;color:#334155">' +
            '<p style="font-weight:600;margin:0 0 8px">Baseline didn\u2019t load</p>' +
            '<p style="margin:0 0 8px">Developing? Run <code style="background:#f1f5f9;padding:2px 6px;border-radius:4px">npm run dev</code> and keep that terminal open, then reload the extension.</p>' +
            '<p style="margin:0">Testing without dev server? Run <code style="background:#f1f5f9;padding:2px 6px;border-radius:4px">npm run build</code> and load the <code style="background:#f1f5f9;padding:2px 6px;border-radius:4px">.output/chrome-mv3</code> folder in chrome://extensions.</p>' +
            '</div>';
        }
      }, 4000);
    </script>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
